name: iOS TestFlight Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  APP_ID: "com.uamkoreatech.tacticalprompt"
  APP_NAME: "TacticalPrompt"
  SCHEME: "App"
  XCODE_VERSION: "16.2"
  TEAM_ID: "FMAB3J4HQ2"
  APP_STORE_CONNECT_KEY_ID: "599L62H6Y8"
  APP_STORE_CONNECT_ISSUER_ID: "e4c69502-cb98-4fed-b19b-e01d47c5c358"
  WEBSITE_URL: "https://tacticalprompt.blogspot.com"

jobs:
  build-and-deploy:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_${{ env.XCODE_VERSION }}.app

      - name: Setup provisioning
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          base64 --decode -i certs/dist_certificate.b64 -o $CERTIFICATE_PATH
          base64 --decode -i provisioning/tacticalprompt_appstore.b64 -o $PP_PATH

          security create-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "ci_keychain_pass" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "ci_keychain_pass" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          security cms -D -i $PP_PATH > $RUNNER_TEMP/profile_decoded.plist
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" $RUNNER_TEMP/profile_decoded.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print TeamIdentifier:0" $RUNNER_TEMP/profile_decoded.plist)
          PP_NAME=$(/usr/libexec/PlistBuddy -c "Print Name" $RUNNER_TEMP/profile_decoded.plist)

          echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV
          echo "TEAM_ID=$TEAM_ID" >> $GITHUB_ENV
          echo "PP_NAME=$PP_NAME" >> $GITHUB_ENV

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup Capacitor iOS
        run: npx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: |
          cd ios/App
          gem install cocoapods
          pod install

      - name: Disable code signing for Pods
        run: |
          cd ios/App
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
            content = f.read()
          inject = """
              installer.pods_project.targets.each do |target|
                target.build_configurations.each do |config|
                  config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                  config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                  config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''
                  config.build_settings['CODE_SIGN_IDENTITY'] = ''
                end
              end
          """
          if 'post_install do |installer|' in content:
            content = content.replace(
              'post_install do |installer|',
              'post_install do |installer|' + inject
            )
          else:
            content += "\npost_install do |installer|" + inject + "\nend\n"
          with open('Podfile', 'w') as f:
            f.write(content)
          PYEOF
          cat Podfile
          pod install

      - name: Update bundle identifier and display name
        run: |
          cd ios/App/App
          if [ -f Info.plist ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier ${{ env.APP_ID }}" Info.plist || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName ${{ env.APP_NAME }}" Info.plist || true
          fi

      - name: Set deployment target
        run: |
          cd ios/App
          if [ -f App.xcodeproj/project.pbxproj ]; then
            sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]*/IPHONEOS_DEPLOYMENT_TARGET = 14.0/g' App.xcodeproj/project.pbxproj
          fi

      - name: Build archive (unsigned)
        run: |
          cd ios/App
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme "${{ env.SCHEME }}" \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -sdk iphoneos \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -quiet

      - name: Sign and package IPA
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          APP_PATH="$RUNNER_TEMP/App.xcarchive/Products/Applications/App.app"

          security cms -D -i $PP_PATH > $RUNNER_TEMP/profile_decoded.plist
          /usr/libexec/PlistBuddy -x -c "Print Entitlements" $RUNNER_TEMP/profile_decoded.plist > $RUNNER_TEMP/entitlements.plist

          cp $PP_PATH "$APP_PATH/embedded.mobileprovision"

          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -maxdepth 1 \( -name "*.framework" -o -name "*.dylib" \) | while read fw; do
              codesign --force --sign "Apple Distribution" --timestamp=none "$fw"
            done
          fi

          codesign --force --sign "Apple Distribution" \
            --entitlements $RUNNER_TEMP/entitlements.plist \
            --timestamp=none \
            "$APP_PATH"

          codesign --verify --deep --strict "$APP_PATH"

          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$APP_PATH" $RUNNER_TEMP/Payload/
          mkdir -p $RUNNER_TEMP/output
          cd $RUNNER_TEMP && zip -qr output/App.ipa Payload

      - name: Upload to TestFlight
        run: |
          mkdir -p ~/private_keys
          cp certs/AuthKey_599L62H6Y8.p8 ~/private_keys/AuthKey_${{ env.APP_STORE_CONNECT_KEY_ID }}.p8

          xcrun altool --upload-app \
            -f $RUNNER_TEMP/output/*.ipa \
            -t ios \
            --apiKey "${{ env.APP_STORE_CONNECT_KEY_ID }}" \
            --apiIssuer "${{ env.APP_STORE_CONNECT_ISSUER_ID }}"

      - name: Cleanup
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -rf $RUNNER_TEMP/Payload $RUNNER_TEMP/output || true
